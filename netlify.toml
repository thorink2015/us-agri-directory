[build]
  command = "npm run build"
  publish = ".next"
  # Redeploy trigger: 2026-04-30 (force rebuild after build-minute throttling)

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js plugin for Netlify — required for SSG/ISR
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Auto-ping IndexNow after every successful production deploy
[[plugins]]
  package = "./netlify/plugins/indexnow"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/apple-icon*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Explicit snippet/image generosity so AI Overviews and AI search engines
    # can quote full answer blocks instead of truncating to 160 chars.
    X-Robots-Tag = "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://formspree.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://formspree.io https://whatsapp.com; frame-src https://www.youtube.com; object-src 'none'; base-uri 'self';"

# Override X-Robots-Tag on the /go/* redirect routes so crawlers skip them
# regardless of page-level metadata.
[[headers]]
  for = "/go/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Canonical domain redirects (enforce HTTPS + non-www in a single hop)
# All variants jump directly to https://agdronedirectory.com/:splat
[[redirects]]
  from = "https://www.agdronedirectory.com/*"
  to = "https://agdronedirectory.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.agdronedirectory.com/*"
  to = "https://agdronedirectory.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://agdronedirectory.com/*"
  to = "https://agdronedirectory.com/:splat"
  status = 301
  force = true

# Preserve old URLs if you had any (add as needed)
# [[redirects]]
#   from = "/old-path"
#   to = "/new-path"
#   status = 301

# ── Operator slug redirects (canonicalize duplicates / renames) ───────────
# Kuhn's Aerial Applications: merged duplicate kuhn-s-aerial-applications-llc
# into the more complete kuhns-aerial-applications entry.
[[redirects]]
  from = "/operators/kuhn-s-aerial-applications-llc"
  to = "/operators/kuhns-aerial-applications"
  status = 301
  force = true

# Flying Cowboy: business pivot from photography to ag services
# (renamed slug; same operator, same site).
[[redirects]]
  from = "/operators/flying-cowboy-photography"
  to = "/operators/flying-cowboy-ag-services"
  status = 301
  force = true

# American Drone: rebuilt entry under canonical slug 'american-drone'
# (was american-drone-llc; new entry sourced from public records,
# pendingConfirmation true).
[[redirects]]
  from = "/operators/american-drone-llc"
  to = "/operators/american-drone"
  status = 301
  force = true
